<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Orange background circle -->
  <circle cx="32" cy="32" r="32" fill="#f97316"/>
  <!-- Running figure in white -->
  <!-- Head -->
  <circle cx="38" cy="13" r="6" fill="white"/>
  <!-- Body (torso leaning forward) -->
  <line x1="36" y1="19" x2="30" y2="36" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right arm (forward, up) -->
  <line x1="35" y1="24" x2="44" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm (back, down) -->
  <line x1="33" y1="27" x2="24" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right leg (forward, bent at knee) -->
  <line x1="30" y1="36" x2="36" y2="48" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="48" x2="46" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left leg (back, behind body) -->
  <line x1="30" y1="36" x2="22" y2="46" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="46" x2="18" y2="56" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
